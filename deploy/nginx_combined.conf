worker_processes  1;

events {
    worker_connections  1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout  65;

  # Enable gzip compression
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_vary on;
  gzip_types
    application/atom+xml
    application/javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rss+xml
    application/vnd.geo+json
    application/vnd.ms-fontobject
    application/x-font-ttf
    application/x-web-app-manifest+json
    application/xhtml+xml
    application/xml
    font/opentype
    image/bmp
    image/svg+xml
    image/x-icon
    text/cache-manifest
    text/css
    text/plain
    text/vcard
    text/vnd.rim.location.xloc
    text/vtt
    text/x-component
    text/x-cross-domain-policy;

  # Proxy settings
  proxy_buffering    off;
  proxy_set_header   X-Real-IP $remote_addr;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header   Host $http_host;
  proxy_http_version 1.1;

  # Timeouts for Play cold-start within the same container
  proxy_connect_timeout 5s;
  proxy_read_timeout    60s;

  # Detect social/link-preview bots for OG page serving
  map $http_user_agent $is_bot {
    default       0;
    ~*Twitterbot  1;
    ~*Slackbot    1;
    ~*WhatsApp    1;
    ~*facebot     1;
    ~*LinkedInBot 1;
    ~*TelegramBot 1;
    ~*Discordbot  1;
  }

  upstream my-backend {
    server localhost:9000;
  }

  # Redirect bare domain → www (production only; harmless in local)
  server {
    listen 80;
    server_name shobdo.info;
    return 301 https://www.shobdo.info$request_uri;
  }

  server {
    listen       80 default_server;
    server_name  _;

    # Add security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Service worker must never be cached by the browser HTTP cache
    location ~* (sw\.js|workbox-.+\.js)$ {
        root   /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # index.html: always revalidate so the SPA shell is fresh
    location = /index.html {
        root   /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
    }

    # Correct MIME type for the PWA manifest
    location ~* \.webmanifest$ {
        root   /usr/share/nginx/html;
        add_header Content-Type "application/manifest+json";
    }

    # Static file caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg)$ {
        root   /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Legacy ?word= → new canonical path (301 for crawlers)
    if ($arg_word != '') {
        return 301 /bn/word/$arg_word;
    }

    # Social bots on /bn/word/<spelling> → Play OG preview page (localhost, no SSL)
    location ~ ^/bn/word/ {
        if ($is_bot) {
            proxy_pass http://my-backend;
        }
        root   /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Enable browser caching for HTML files but with short expiry
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Allow robots.txt and sitemap.xml to be accessed without aggressive caching
    location ~* ^/(robots\.txt|sitemap\.xml)$ {
        root   /usr/share/nginx/html;
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    location /api {
        proxy_pass http://my-backend;
    }

    # redirect server error pages to the static page /50x.html
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
  }
}
