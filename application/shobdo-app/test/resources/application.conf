shobdo {
  scheduler.enabled = false

  mongodb {
    hostname = "127.0.0.1"
    hostname = ${?SHOBDO_MONGODB_HOSTNAME}
    port = 27017
    database {
      dbname = "Dictionary"
      collection {
        words = "Words"
        userrequests = "UserRequests"
        users = "Users"
        likes = "Likes"
        inflectionindex = "InflectionIndex"
      }
    }
    # No connectionString here — tests always connect to local MongoDB
  }
  redis {
    hostname = "127.0.0.1"
    hostname = ${?SHOBDO_REDIS_HOSTNAME}
  }
  google {
    clientId = "YOUR_GOOGLE_CLIENT_ID"
    clientId = ${?SHOBDO_GOOGLE_CLIENT_ID}
  }
}

play.crypto.secret = "tahsintest"

play.filters.cors {
  pathPrefixes = ["/"]
  allowedOrigins = null
  allowedHttpMethods = ["GET", "POST", "PUT", "DELETE"]
  allowedHttpHeaders = null
}


play.i18n {
  langs = [ "en" ]
}

akka.daemonic = on
